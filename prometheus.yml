global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:

  # llm-proxy v2 — running on spark-01 alongside vLLM
  - job_name: llm_proxy
    static_configs:
      - targets: ['spark-01:9091']

  # vLLM built-in metrics — serves on same port as OpenAI API
  - job_name: vllm
    static_configs:
      - targets:
          - 'spark-01:3040'
          - 'spark-01:3041'
          - 'spark-01:3042'
          - 'spark-01:3043'
          - 'spark-01:3044'
          - 'spark-01:3045'
          - 'spark-01:3046'
          - 'spark-01:3047'
          - 'spark-01:3048'
          - 'spark-01:3049'
          - 'spark-01:3050'
    metrics_path: /metrics

  # nv-monitor — system/GPU resources on GPU servers
  - job_name: nv_monitor
    scrape_interval: 5s
    static_configs:
      - targets: ['spark-01:9011']
        labels:
          host: spark-01
